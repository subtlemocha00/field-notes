<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <meta name="description" content="Construction field book for inspectors." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Field Notes" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Field Notes</title>
  <style>
    /* Inline so the standalone PWA never shows a blank white window during
       cold start, before the bundled CSS has loaded. */
    html,
    body {
      height: 100%;
      margin: 0;
      background-color: #f5f5f4;
      color: #1c1917;
    }

    #root {
      min-height: 100%;
    }

    .boot-splash {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 24px;
      font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #57534e;
    }

    @media (prefers-color-scheme: dark) {

      html,
      body {
        background-color: #0c0a09;
        color: #f5f5f4;
      }

      .boot-splash {
        color: #a8a29e;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="boot-splash">Loading…</div>
  </div>
  <!-- Uncomment for mobile debugging via eruda:
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script> -->

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
