name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 🔐 Grant workflow permission to write to gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

# 🚀 Opt into Node.js 24 early to silence deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true  # ✅ Clean slate for first deploy
          keep_files: false   # ✅ Only publish dist/ contents